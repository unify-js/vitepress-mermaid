name: Publish create-vitepress-mermaid to npm

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          version: 10
          cache: true

      - name: Install dependencies
        run: pnpm install

      - name: Build package
        run: pnpm run build
        working-directory: packages/create-vitepress-mermaid

      - name: Run tests
        run: pnpm run test:run
        working-directory: packages/create-vitepress-mermaid

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks
        working-directory: packages/create-vitepress-mermaid
